<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Port Manager</title>
  <link rel="stylesheet" href="styles/dark.css" id="theme-dark">
  <link rel="stylesheet" href="styles/light.css" id="theme-light" disabled>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <h1 class="toolbar-title">Port Manager</h1>
      <div class="toolbar-controls">
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Search ports, processes..." autocomplete="off" />
        </div>
        <select id="source-filter">
          <option value="all">All Sources</option>
          <option value="WSL">WSL</option>
          <option value="Windows">Windows</option>
        </select>
        <button id="refresh-btn" class="btn btn-icon" title="Refresh">
          <span class="refresh-icon">↻</span>
        </button>
        <button id="settings-btn" class="btn btn-icon" title="Settings">
          <span class="settings-icon">⚙</span>
        </button>
      </div>
    </header>

    <div id="error-banner" class="error-banner" style="display: none;"></div>

    <main class="table-container">
      <table id="port-table">
        <thead>
          <tr>
            <th data-column="port" class="sortable">Port <span class="sort-indicator"></span></th>
            <th data-column="protocol" class="sortable">Protocol <span class="sort-indicator"></span></th>
            <th data-column="localAddress" class="sortable">Local Address <span class="sort-indicator"></span></th>
            <th data-column="state" class="sortable">State <span class="sort-indicator"></span></th>
            <th data-column="pid" class="sortable">PID <span class="sort-indicator"></span></th>
            <th data-column="processName" class="sortable">Process <span class="sort-indicator"></span></th>
            <th data-column="source" class="sortable">Source <span class="sort-indicator"></span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="port-table-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display: none;">
        <p>No ports found</p>
      </div>
      <div id="loading-state" class="loading-state">
        <p>Scanning ports…</p>
      </div>
    </main>

    <div id="settings-panel" class="settings-panel" style="display: none;">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" class="btn btn-icon" title="Close">✕</button>
      </div>
      <div class="settings-body">
        <div class="setting-row">
          <label for="theme-select">Theme</label>
          <select id="theme-select">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="system">System</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="refresh-select">Auto-refresh</label>
          <select id="refresh-select">
            <option value="1000">1s</option>
            <option value="3000">3s</option>
            <option value="5000">5s</option>
            <option value="10000">10s</option>
            <option value="30000">30s</option>
            <option value="0">Off</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="confirm-toggle">Confirm before stop</label>
          <input type="checkbox" id="confirm-toggle" checked>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="js/toast.js"></script>
  <script src="js/table.js"></script>
  <script src="js/settings-ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
